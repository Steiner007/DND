 you've met \u2014 each face painted from their name, with your notes on what you've learned and a candle meter showing how close you've grown. The DM privately gives each one a hidden agenda; the candles never spoil the secrets. The cast remembers everything between sessions."},{icon:"\u{1F4D3}",title:"The DM's notebook",body:"The self-training part. The DM takes notes on your table mid-game and again when you tap END SESSION \u2014 what you both enjoy, the right difficulty, running jokes, twists it plans to spring. Every future session is shaped by these notes. Ending sessions regularly is how the DM gets better."},{icon:"\u2754",title:"Stuck? Just ask",body:'The DM is also your guide. Type things like "what are our options?", "what does that roll mean?", or "explain what just happened" any time \u2014 it will step out from behind the screen, explain plainly, then drop back into the story. The \u2754 chip above the text box does this in one tap.'}];function Og({roll:t,onResult:e,used:l}){let[a,n]=(0,w.useState)(!1),[i,u]=(0,w.useState)(null),[c,o]=(0,w.useState)(null),d=(0,w.useRef)([]);(0,w.useEffect)(()=>()=>{d.current.forEach(m=>{clearInterval(m),clearTimeout(m)})},[]);let p=String(t.expr).match(/d(\d+)/i),v=p?Math.max(2,parseInt(p[1],10)):20;return(0,s.jsxs)("button",{onClick:()=>{if(l||a)return;n(!0),u(1+Math.floor(Math.random()*v));let m=setInterval(()=>u(1+Math.floor(Math.random()*v)),75);d.current.push(m);let T=setTimeout(()=>{clearInterval(m);let z=dg(t.expr);n(!1),u(null),z&&(o(z.total),e(t,z))},950);d.current.push(T)},disabled:l,style:{display:"inline-flex",alignItems:"center",gap:8,background:l?"#3a2f22":"linear-gradient(180deg,#8E2C2C,#6d1f1f)",color:l?"#8a7b60":"#EDE3C8",border:"1px solid "+(l?"#4a3d2c":"#a94040"),borderRadius:6,padding:"9px 14px",fontFamily:"'Cinzel',serif",fontSize:13,letterSpacing:"0.06em",cursor:l?"default":"pointer",boxShadow:l?"none":"0 2px 10px rgba(142,44,44,0.4)"},children:[(0,s.jsx)("span",{style:{fontSize:18,display:"inlin
