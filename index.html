<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Candlelit Table - AI Dungeon Master</title>

  <!-- React & Babel CDNs -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- PeerJS for Free Multi-Device Peer-to-Peer Sync -->
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

  <style>
    :root {
      --bg-main: #0f0f13;
      --panel-bg: #181820;
      --accent: #d4af37;
      --text: #e0e0e0;
      --text-muted: #a0a0a0;
      --border: #2a2a35;
      --danger: #e74c3c;
      --success: #2ecc71;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    body { background: var(--bg-main); color: var(--text); padding: 15px; display: flex; justify-content: center; }
    #root { width: 100%; max-width: 900px; }

    .card { background: var(--panel-bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 15px; }
    .header { text-align: center; color: var(--accent); margin-bottom: 15px; }
    .header h1 { font-size: 1.8rem; margin-bottom: 5px; }

    /* PeerJS & Gate Controls */
    .network-bar { background: #13131a; border: 1px solid var(--accent); border-radius: 6px; padding: 12px; margin-bottom: 15px; }
    .flex-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    input, button, select { padding: 8px 12px; border-radius: 4px; border: 1px solid var(--border); background: #22222e; color: #fff; font-size: 0.95rem; }
    button { background: var(--accent); color: #000; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
    button:hover { opacity: 0.9; }

    /* Game State & Log */
    .hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-bottom: 15px; }
    .hero-card { background: #20202c; border: 1px solid var(--border); border-radius: 6px; padding: 10px; }
    .hero-card h3 { color: var(--accent); font-size: 1.1rem; }
    .hp-bar { height: 8px; background: #333; border-radius: 4px; overflow: hidden; margin: 6px 0; }
    .hp-fill { height: 100%; background: var(--success); transition: width 0.3s; }

    .log-box { height: 350px; overflow-y: auto; background: #121218; border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 10px; }
    .log-entry { padding: 8px 12px; border-radius: 6px; background: #1a1a24; font-size: 0.95rem; line-height: 1.4; }
    .log-entry.dm { border-left: 3px solid var(--accent); }
    .log-entry.player { border-left: 3px solid #3498db; background: #151d28; }
    .log-entry.system { border-left: 3px solid #9b59b6; background: #1a1524; font-style: italic; }

    .input-area { display: flex; gap: 8px; }
    .input-area input { flex: 1; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function CandlelitTable() {
      // --- API Key & Config State ---
      const [apiKey, setApiKey] = useState(localStorage.getItem('ct_api_key') || '');
      const [apiProvider, setApiProvider] = useState(localStorage.getItem('ct_provider') || 'gemini');
      const [isKeySaved, setIsKeySaved] = useState(!!localStorage.getItem('ct_api_key'));

      // --- PeerJS Network State ---
      const [peer, setPeer] = useState(null);
      const [connections, setConnections] = useState([]);
      const [roomCode, setRoomCode] = useState('');
      const [joinCode, setJoinCode] = useState('');
      const [isHost, setIsHost] = useState(true);
      const [netStatus, setNetStatus] = useState('Standalone (Local)');

      // --- Core Game Engine State ---
      const [gameState, setGameState] = useState({
        party: [
          { name: 'Valerius', class: 'Fighter', hp: 24, maxHp: 24, items: ['Longsword', 'Shield'] },
          { name: 'Lyra', class: 'Mage', hp: 14, maxHp: 14, items: ['Staff', 'Arcane Scroll'] }
        ],
        logs: [
          { sender: 'DM', text: 'Welcome to The Candlelit Table. The tavern fire crackles gently. How do you prepare for your journey?' }
        ]
      });

      const [inputAction, setInputAction] = useState('');
      const [activeHero, setActiveHero] = useState('Valerius');
      const [isLoading, setIsLoading] = useState(false);
      const logEndRef = useRef(null);

      useEffect(() => {
        logEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [gameState.logs]);

      // --- Save API Key ---
      const saveKey = () => {
        localStorage.setItem('ct_api_key', apiKey);
        localStorage.setItem('ct_provider', apiProvider);
        setIsKeySaved(true);
      };

      // --- PeerJS Multiplayer Networking Logic ---
      const initializeHostRoom = () => {
        const code = Math.random().toString(36).substring(2, 6).toUpperCase();
        const newPeer = new Peer(`candlelit-${code}`);

        newPeer.on('open', () => {
          setRoomCode(code);
          setIsHost(true);
          setNetStatus(`Hosting Room: ${code}`);
        });

        newPeer.on('connection', (conn) => {
          conn.on('open', () => {
            setConnections((prev) => [...prev, conn]);
            // Sync game state to newly joined phone
            conn.send({ type: 'SYNC_STATE', state: gameState });
          });

          conn.on('data', (data) => {
            if (data.type === 'PLAYER_ACTION') {
              handlePlayerTurn(data.playerName, data.actionText);
            }
          });
        });

        setPeer(newPeer);
      };

      const joinHostRoom = () => {
        if (!joinCode.trim()) return;
        const newPeer = new Peer();

        newPeer.on('open', () => {
          const conn = newPeer.connect(`candlelit-${joinCode.trim().toUpperCase()}`);

          conn.on('open', () => {
            setIsHost(false);
            setConnections([conn]);
            setNetStatus(`Connected to Room: ${joinCode.toUpperCase()}`);
          });

          conn.on('data', (data) => {
            if (data.type === 'SYNC_STATE') {
              setGameState(data.state);
            }
          });
        });

        setPeer(newPeer);
      };

      const broadcastStateToGuests = (newState) => {
        if (isHost && connections.length > 0) {
          connections.forEach((conn) => {
            if (conn.open) {
              conn.send({ type: 'SYNC_STATE', state: newState });
            }
          });
        }
      };

      // --- DM Tag Parser Engine ---
      const parseAndApplyTags = (rawText) => {
        let cleanText = rawText;
        let updatedParty = [...gameState.party];

        // Parse HP adjustment tag: [HP:Valerius:-5]
        const hpMatches = [...rawText.matchAll(/\[HP:([^:]+):([+-]?\d+)\]/g)];
        hpMatches.forEach(([tag, name, delta]) => {
          cleanText = cleanText.replace(tag, '');
          updatedParty = updatedParty.map(hero => {
            if (hero.name.toLowerCase() === name.toLowerCase()) {
              const newHp = Math.max(0, Math.min(hero.maxHp, hero.hp + parseInt(delta, 10)));
              return { ...hero, hp: newHp };
            }
            return hero;
          });
        });

        // Parse Item tag: [ITEM:Valerius:+Health Potion]
        const itemMatches = [...rawText.matchAll(/\[ITEM:([^:]+):([+-])([^\]]+)\]/g)];
        itemMatches.forEach(([tag, name, op, item]) => {
          cleanText = cleanText.replace(tag, '');
          updatedParty = updatedParty.map(hero => {
            if (hero.name.toLowerCase() === name.toLowerCase()) {
              let newItems = [...hero.items];
              if (op === '+') newItems.push(item.trim());
              else newItems = newItems.filter(i => i !== item.trim());
              return { ...hero, items: newItems };
            }
            return hero;
          });
        });

        return { cleanText, updatedParty };
      };

      // --- Call API Engine (Gemini / Claude) ---
      const callAiEngine = async (userPrompt, currentLogs) => {
        if (!apiKey) {
          return "System Error: Please enter your API key in the configuration bar above.";
        }

        const promptSystem = `You are an expert AI Dungeon Master running 'The Candlelit Table'.
Narrate concisely and dynamically. Emit structural state tags inline when mechanics occur:
- Change HP: [HP:HeroName:-5] or [HP:HeroName:+3]
- Add/Remove Item: [ITEM:HeroName:+Shield] or [ITEM:HeroName:-Scroll]
Keep game responses within 2-4 narrative sentences.`;

        if (apiProvider === 'gemini') {
          try {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                contents: [{ parts: [{ text: `${promptSystem}\n\nUser Action: ${userPrompt}` }] }]
              })
            });
            const data = await res.json();
            return data?.candidates?.[0]?.content?.parts?.[0]?.text || "The DM pauses silently in thought...";
          } catch (e) {
            return `API Error: ${e.message}`;
          }
        }
        return "Selected provider setup pending.";
      };

      // --- Handle Turn Submissions ---
      const handlePlayerTurn = async (playerName, text) => {
        if (!text.trim()) return;

        const newLog = { sender: playerName, text };
        const updatedLogs = [...gameState.logs, newLog];
        
        const nextState = { ...gameState, logs: updatedLogs };
        setGameState(nextState);
        broadcastStateToGuests(nextState);

        if (isHost) {
          setIsLoading(true);
          const rawResponse = await callAiEngine(`${playerName}: ${text}`, updatedLogs);
          const { cleanText, updatedParty } = parseAndApplyTags(rawResponse);

          const finalLogs = [...updatedLogs, { sender: 'DM', text: cleanText }];
          const finalState = { party: updatedParty, logs: finalLogs };

          setGameState(finalState);
          broadcastStateToGuests(finalState);
          setIsLoading(false);
        }
      };

      const submitTurn = () => {
        if (isHost) {
          handlePlayerTurn(activeHero, inputAction);
        } else {
          // Send to Host over WebRTC
          if (connections[0] && connections[0].open) {
            connections[0].send({
              type: 'PLAYER_ACTION',
              playerName: activeHero,
              actionText: inputAction
            });
            // Append local display log
            setGameState(prev => ({
              ...prev,
              logs: [...prev.logs, { sender: activeHero, text: inputAction }]
            }));
          }
        }
        setInputAction('');
      };

      return (
        <div>
          {/* Header */}
          <div className="header">
            <h1>🕯️ The Candlelit Table</h1>
            <p style={{ color: 'var(--text-muted)', fontSize: '0.9rem' }}>
              In-Person AI Tabletop RPG Platform
            </p>
          </div>

          {/* API Key Configuration Gate */}
          <div className="card">
            <div className="flex-row">
              <label><strong>AI Key:</strong></label>
              <select value={apiProvider} onChange={(e) => setApiProvider(e.target.value)}>
                <option value="gemini">Google Gemini (Free)</option>
              </select>
              <input
                type="password"
                placeholder="Paste API Key..."
                value={apiKey}
                onChange={(e) => setApiKey(e.target.value)}
                style={{ flex: 1 }}
              />
              <button onClick={saveKey}>{isKeySaved ? 'Saved ✓' : 'Save Key'}</button>
            </div>
          </div>

          {/* PeerJS Free Multiplayer Bar */}
          <div className="network-bar">
            <div className="flex-row" style={{ justifyContent: 'space-between' }}>
              <div>
                <strong>Network Status:</strong> <span style={{ color: 'var(--accent)' }}>{netStatus}</span>
              </div>
              {isHost && !roomCode && (
                <button onClick={initializeHostRoom}>🎲 Host Multiplayer Session</button>
              )}
              {!roomCode && isHost && (
                <div className="flex-row">
                  <input
                    type="text"
                    placeholder="4-Letter Code"
                    maxLength={4}
                    value={joinCode}
                    onChange={(e) => setJoinCode(e.target.value)}
                    style={{ width: '110px', textTransform: 'uppercase' }}
                  />
                  <button onClick={joinHostRoom}>Join Game</button>
                </div>
              )}
            </div>
          </div>

          {/* Party Hero Cards */}
          <div className="hero-grid">
            {gameState.party.map((hero) => (
              <div
                key={hero.name}
                className="hero-card"
                style={{
                  borderColor: activeHero === hero.name ? 'var(--accent)' : 'var(--border)',
                  cursor: 'pointer'
                }}
                onClick={() => setActiveHero(hero.name)}
              >
                <h3>{hero.name} ({hero.class})</h3>
                <div className="hp-bar">
                  <div
                    className="hp-fill"
                    style={{ width: `${(hero.hp / hero.maxHp) * 100}%` }}
                  />
                </div>
                <div style={{ fontSize: '0.85rem', color: 'var(--text-muted)' }}>
                  HP: {hero.hp}/{hero.maxHp}
                </div>
                <div style={{ fontSize: '0.8rem', marginTop: '4px' }}>
                  🎒 {hero.items.join(', ')}
                </div>
              </div>
            ))}
          </div>

          {/* Campaign Narrative Log */}
          <div className="log-box">
            {gameState.logs.map((log, idx) => (
              <div
                key={idx}
                className={`log-entry ${log.sender === 'DM' ? 'dm' : log.sender === 'System' ? 'system' : 'player'}`}
              >
                <strong>{log.sender}:</strong> {log.text}
              </div>
            ))}
            {isLoading && <div className="log-entry dm"><em>The DM is writing the story...</em></div>}
            <div ref={logEndRef} />
          </div>

          {/* Action Input Bar */}
          <div className="card input-area">
            <select value={activeHero} onChange={(e) => setActiveHero(e.target.value)}>
              {gameState.party.map(h => <option key={h.name} value={h.name}>{h.name}</option>)}
            </select>
            <input
              type="text"
              placeholder={`What does ${activeHero} do?`}
              value={inputAction}
              onChange={(e) => setInputAction(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && submitTurn()}
            />
            <button onClick={submitTurn}>Take Action</button>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<CandlelitTable />);
  </script>
</body>
</html>
