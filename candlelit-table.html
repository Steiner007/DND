- Keep each reply 120\u2013220 words. Vivid, concrete, tight. Always end on a clear situation and an open question.

- TIERED DETAIL: full cinematic prose at scene openings/closings. Mid-combat and rapid exchanges stay punchy and mechanical: "He swings with a flare of aggression. The bandit swings back \u2014 3 damage." Then hand over the turn.
- NPC DIALOGUE: one small physical/tonal cue plus the line, then yield: He leans back. Marla: "What are you thinking?" Save scenery for scene boundaries, not mid-conversation.
- POSITIONING IS NARRATIVE \u2014 no battle grid. Describe distance in fiction: "close enough to lunge", "two rounds of hard running away". Be generous and clear over precise.

- REMIND THEM OF THEIR TOOLS: when a known ability would shine, surface it briefly with what it does and the tradeoff, then let them choose.
- RESTS LIVE IN THE STORY: proactively narrate natural breathers \u2014 binding wounds (SHORT rest) or making camp (LONG rest, full recovery). Frame as fiction, never a mechanical timeout; heal with [HP:...].

- ADAPT LIVE to the table's mood. Jot lasting preferences with [LEARN:{"note":"they light up during NPC banter"}] \u2014 these persist forever.

 on purpose \u2014 most scenes have none."},{icon:"\u{1F310}",title:"Online table",body:"One person hosts: open \u2699 and tap HOST THIS TABLE ONLINE to get a six-letter code. Everyone else taps \u{1F310} JOIN A TABLE on their own device, enters the code and their name, then brings one of their own saved heroes or forges a new one on the spot \u2014 that character joins the host's party, and only its player can roll its dice. They get a live seat \u2014 the story, the DM's replies, and every dice roll appear on their screen, and they can act and roll from there. The host's app must stay open; the host's device runs the DM. Works between devices in the Claude app; on the GitHub edition it reaches between tabs on the same device."},{icon:"\u{1F4AC}",title:"DM Chat",body:"The \u{1F4AC} DM tab is a side channel to the Dungeon Master, fully out of character. Ask rules questions, 'can I use a bonus action here?', 'what are my options?' \u2014 you get a plain, direct answer and the story doesn't move an inch. When you're ready, return to the main window and act."},{icon:"\u{1F5D2}",title:"Your notes",body:"When you uncover something worth remembering \u2014 a lie caught by an Insight check, a rumor of hidden treasure, a name in a letter \u2014 the DM automatically writes it into the \u{1F5D2} Notes tab. Rumors of bonus loot caches land here too; chasing them tends to pay better than the main road."},{icon:"\u27F3",title:"Combat & positioning",body:"Combat runs in clear rounds \u2014 the tracker shows initiative and what every monster did. There's no grid: positioning is part of the story ('close enough to lunge', 'two rounds of running away'). Declare your action, roll when asked, then hear the result. Watch for traps \u2014 quick reflexes (DEX saves) matter."},{icon:"\u2699",title:"Settings & house rules",body:"The \u2699 gear holds the non-gameplay tools: rescue codes, narrator voice, and the adventure shelf. It's also where you set HOUSE RULES \u2014 standing orders the DM follows every scene, like 'aim for half combat, half talking' or 'keep scenes short'. They persist until you change them."},{icon:"\u{1F4DC}",title:"Player sheets",body:"Tap \u{1F4DC} to see both characters: health, XP, stats, abilities, and inventory. You can adjust anything by hand \u2014 fix HP, rename an item, tweak a stat \u2014 and the DM will honor it. Stats: STR is muscle, DEX is agility, CON is toughness, INT is book smarts, WIS is instinct, CHA is charm."},{icon:"\u2B06",title:"Leveling up",body:"The DM awards XP for clever plans, hard fights, and big story moments. When your XP bar fills (level \xD7 100), a LEVEL UP button appears on your sheet. It opens a choice of three upgrades designed for your character and your story \u2014 each one explains in plain language exactly what it does before you pick."},{icon:"\u2726",title:"Items & rewards",body:"The DM invents unique treasures tied to your story \u2014 named items with history and effects. They land in your inventory automatically and are listed on your sheet. Rarity runs common \u2192 uncommon \u2192 rare \u2192 legendary. Legendary items are earned across many sessions."},{icon:"\u{1F50A}",title:"Voice acting",body:"Tap \u{1F50A} to have the DM read scenes aloud \u2014 the narrator uses one voice, and each character speaks with their own (gruff, raspy, lilting\u2026). You can also tap \u25B6 on any single message. Voices come from your device, so quality varies by phone."},{icon:"\u{1F3AD}",title:"Cast of characters",body:"A portrait gallery of everyone you've met \u2014 each face painted from their name, with your notes on what you've learned and a candle meter showing how close you've grown. The DM privately gives each one a hidden agenda; the candles never spoil the secrets. The cast remembers everything between sessions."},{icon:"\u{1F4D3}",title:"The DM's notebook",body:"The self-training part. The DM takes notes on your table mid-game and again when you tap END SESSION \u2014 what you both
